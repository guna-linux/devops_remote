---
- name_test: Install Grafana Server
  hosts: grafana_servers
  become: yes

  tasks:

  - name: Install required packages
    apt:
      name: apt-transport-https
      state: present
      update_cache: yes

  - name: Add Grafana GPG key
    apt_key:
      url: https://packages.grafana.com/gpg.key
      state: present

  - name: Add Grafana repository
    apt_repository:
      repo: "deb https://packages.grafana.com/oss/deb stable main"
      state: present

  - name: Install Grafana
    apt:
      name: grafana
      state: present
      update_cache: yes

  - name: Start Grafana service
    service:
      name: grafana-server
      state: started
      enabled: yes

  - name: Copy sample script
    copy:
      src: ../files/sample.sh
      dest: /tmp/sample.sh
      mode: '0755'

  - name: Execute sample script
    command: /tmp/sample.sh
